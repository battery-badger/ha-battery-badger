name: Validate

on:
  push:
  pull_request:
  schedule:
    - cron: "0 6 * * 1"

jobs:
  hassfest:
    name: Hassfest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: home-assistant/actions/hassfest@master

  hacs:
    name: HACS
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hacs/action@main
        with:
          category: integration
          # Brand icons ship in-repo at custom_components/battery_badger/brand/
          # (HA 2026.3+ Brands Proxy API). home-assistant/brands no longer
          # accepts PRs for custom integrations, so the HACS brands check is
          # skipped here.
          ignore: brands
